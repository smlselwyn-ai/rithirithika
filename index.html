# hello-my-buttercup
for my special person 
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    position:relative;
    z-index:10;
}

h1{
    color:#ff2d55;
    margin-bottom:20px;
}

p{
    line-height:1.8;
    color:#444;
}

.heart{
    font-size:60px;
    animation:beat 1s infinite;
    margin:20px;
}

button{
    margin-top:20px;
    padding:12px 28px;
    border:none;
    border-radius:30px;
    background:#ff2d55;
    color:#fff;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    transform:scale(1.05);
}

#message{
    margin-top:20px;
    font-size:22px;
    color:#ff0066;
    font-weight:bold;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.2);}
}
</style>

</head>
<body>

<canvas id="fireworks"></canvas>

<div class="card">

<h1>❤️ For My Sweetheart ❤️</h1>

<div class="heart">💖</div>

<p>
Every day with you feels like a beautiful dream.<br><br>
Thank you for bringing love, happiness, and endless smiles into my life.
</p>

<button onclick="startLove()">
I Love You ❤️
</button>

<div id="message"></div>

</div>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

let particles=[];

function createFirework(x,y){

for(let i=0;i<120;i++){

particles.push({
x:x,
y:y,
dx:(Math.random()-0.5)*8,
dy:(Math.random()-0.5)*8,
life:100,
color:`hsl(${Math.random()*360},100%,60%)`
});

}

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{

ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

p.dy+=0.03;
p.life--;

if(p.life<=0){
particles.splice(index,1);
}

});

requestAnimationFrame(animate);

}

animate();

function startLove(){

document.getElementById("message").innerHTML=
"❤️ I Love You Forever ❤️<br>You Are My World 🌍🥰";

for(let i=0;i<10;i++){

setTimeout(()=>{

createFirework(
Math.random()*canvas.width,
Math.random()*canvas.height/2
);

},i*300);

}

}
</script>

</body>
</html>
